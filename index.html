<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Toilet Aim Trainer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f172a; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const C = document.getElementById('game');
const ctx = C.getContext('2d');

let W, H, dpr, scale;
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  C.width = W * dpr; C.height = H * dpr;
  C.style.width = W + 'px'; C.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scale = Math.min(W / 400, H / 700);
}
resize(); window.addEventListener('resize', resize);

// ── Face image ──
const faceImg = new Image();
faceImg.src = 'face.jpg';
let faceLoaded = false;
faceImg.onload = () => { faceLoaded = true; };

// ── State ──
let state = 'title'; // title, ready, playing, results
let mouseX = W / 2;
let score = 0, combo = 0, maxCombo = 0, hits = 0, misses = 0;
let timeLeft = 0, maxTime = 30;
let messLevel = 0;
let difficulty = 1; // ramps up
let shakeX = 0, shakeY = 0;

// Toilet
let toiletX, toiletVX, toiletW = 80;
// Guy
let guyX;
// Visuals
let puddles = [];
let drops = [];
let floaters = [];
let streamParts = [];

// Input
function getPos(e) { return (e.touches ? e.touches[0] : e).clientX; }
C.addEventListener('mousemove', e => { mouseX = e.clientX; });
C.addEventListener('touchmove', e => { e.preventDefault(); mouseX = getPos(e); }, { passive: false });
C.addEventListener('touchstart', e => { e.preventDefault(); mouseX = getPos(e); handleTap(); }, { passive: false });
C.addEventListener('click', handleTap);

function handleTap() {
  if (state === 'title') { state = 'ready'; startCountdown(); }
  else if (state === 'results') { state = 'title'; }
}

function startCountdown() {
  let count = 3;
  const iv = setInterval(() => {
    count--;
    if (count <= 0) { clearInterval(iv); startGame(); }
  }, 700);
}

function startGame() {
  state = 'playing';
  score = 0; combo = 0; maxCombo = 0; hits = 0; misses = 0;
  messLevel = 0; difficulty = 1;
  timeLeft = maxTime * 60;
  toiletX = W / 2; toiletVX = 2;
  guyX = W / 2;
  puddles = []; drops = []; floaters = []; streamParts = [];
}

// ── Drawing helpers ──
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawShadow(x, y, rx, ry) {
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fill();
  ctx.restore();
}

// ── Toilet drawing ──
const floorY = () => H * 0.78;

function drawToilet(tx) {
  const fy = floorY();
  const tw = toiletW;

  // Shadow
  drawShadow(tx, fy + 30, tw * 0.7, 12);

  // Tank
  ctx.fillStyle = '#e8e8e8';
  roundRect(tx - 22, fy - 55, 44, 40, 6);
  ctx.fill();
  ctx.strokeStyle = '#d0d0d0'; ctx.lineWidth = 1.5; ctx.stroke();
  // Tank lid
  ctx.fillStyle = '#f0f0f0';
  roundRect(tx - 25, fy - 58, 50, 8, 3);
  ctx.fill();
  ctx.strokeStyle = '#d0d0d0'; ctx.stroke();
  // Flush handle
  ctx.strokeStyle = '#b0b0b0'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(tx + 25, fy - 45); ctx.lineTo(tx + 35, fy - 48);
  ctx.lineTo(tx + 37, fy - 44); ctx.stroke();

  // Bowl outer
  ctx.fillStyle = '#f5f5f5';
  ctx.beginPath();
  ctx.ellipse(tx, fy + 5, tw / 2 + 8, 28, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 2; ctx.stroke();

  // Seat
  ctx.fillStyle = '#e0e0e0';
  ctx.beginPath();
  ctx.ellipse(tx, fy, tw / 2 + 4, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1.5; ctx.stroke();

  // Bowl water
  const waterGrad = ctx.createRadialGradient(tx, fy, 0, tx, fy, tw / 2 - 5);
  waterGrad.addColorStop(0, '#7ec8e3');
  waterGrad.addColorStop(1, '#4a90d9');
  ctx.fillStyle = waterGrad;
  ctx.beginPath();
  ctx.ellipse(tx, fy, tw / 2 - 5, 16, 0, 0, Math.PI * 2);
  ctx.fill();

  // Bowl rim highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(tx, fy - 2, tw / 2 - 8, 12, 0, Math.PI * 1.1, Math.PI * 1.9);
  ctx.stroke();

  // Base
  ctx.fillStyle = '#e8e8e8';
  roundRect(tx - 18, fy + 18, 36, 15, 4);
  ctx.fill();
  ctx.strokeStyle = '#d0d0d0'; ctx.lineWidth = 1; ctx.stroke();
}

// ── Guy drawing ──
function drawGuy(gx) {
  const gy = H * 0.18;
  const bobble = Math.sin(Date.now() / 300) * 2;

  // Body (white t-shirt like the photo)
  ctx.fillStyle = '#f0f0f0';
  roundRect(gx - 16, gy + 28 + bobble, 32, 38, 6);
  ctx.fill();
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1; ctx.stroke();

  // Arms (skin tone)
  ctx.strokeStyle = '#f0d5b8'; ctx.lineWidth = 6; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(gx - 16, gy + 35 + bobble); ctx.lineTo(gx - 30, gy + 50 + bobble); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(gx + 16, gy + 35 + bobble); ctx.lineTo(gx + 30, gy + 50 + bobble); ctx.stroke();

  // Legs
  ctx.strokeStyle = '#2d3748'; ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(gx - 8, gy + 66 + bobble); ctx.lineTo(gx - 12, gy + 88 + bobble); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(gx + 8, gy + 66 + bobble); ctx.lineTo(gx + 12, gy + 88 + bobble); ctx.stroke();

  // Face photo (circular clip)
  const faceR = 28;
  if (faceLoaded) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(gx, gy + bobble, faceR, 0, Math.PI * 2);
    ctx.clip();
    // Draw the face image centered and scaled to fill the circle
    // The photo is a portrait — crop to face area (upper portion)
    const iw = faceImg.naturalWidth;
    const ih = faceImg.naturalHeight;
    // Source crop: focus on face (upper 70% of image, centered)
    const srcSize = Math.min(iw, ih * 0.75);
    const sx = (iw - srcSize) / 2;
    const sy = ih * 0.02;
    ctx.drawImage(faceImg, sx, sy, srcSize, srcSize, gx - faceR, gy - faceR + bobble, faceR * 2, faceR * 2);
    ctx.restore();

    // Circle border
    ctx.beginPath();
    ctx.arc(gx, gy + bobble, faceR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 2;
    ctx.stroke();
  } else {
    // Fallback circle
    ctx.fillStyle = '#f4c89a';
    ctx.beginPath(); ctx.arc(gx, gy + bobble, faceR, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = '16px serif';
    ctx.textAlign = 'center';
    ctx.fillText('😐', gx, gy + 6 + bobble);
  }

  // Sweat drop when messy
  if (messLevel > 50) {
    ctx.fillStyle = '#87CEEB';
    ctx.beginPath();
    ctx.arc(gx + faceR + 5, gy - 10 + bobble + Math.sin(Date.now() / 200) * 3, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  return { x: gx, y: gy + 70 + bobble };
}

// ── Stream ──
function drawStream(fromX, fromY, toX, toY, hitting) {
  // Arc path
  const midY = (fromY + toY) / 2;
  const sway = Math.sin(Date.now() / 150) * 5 * difficulty;

  ctx.strokeStyle = hitting ? '#FFD700' : '#FFEC80';
  ctx.lineWidth = hitting ? 4 : 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(fromX, fromY);
  ctx.bezierCurveTo(
    fromX + sway, midY - 20,
    toX - sway * 0.5, midY + 30,
    toX + (Math.random() - 0.5) * 4, toY
  );
  ctx.stroke();

  // Glow
  ctx.strokeStyle = 'rgba(255, 215, 0, 0.2)';
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.moveTo(fromX, fromY);
  ctx.bezierCurveTo(fromX + sway, midY - 20, toX - sway * 0.5, midY + 30, toX, toY);
  ctx.stroke();

  // Stream droplets
  for (let i = 0; i < 2; i++) {
    const t = Math.random();
    const dx = fromX + (toX - fromX) * t + (Math.random() - 0.5) * 10 * t;
    const dy = fromY + (toY - fromY) * t * t; // gravity curve
    drops.push({ x: dx, y: dy, vx: (Math.random() - 0.5) * 0.5, vy: 0.5 + Math.random(), life: 15, r: 1 + Math.random() * 1.5 });
  }
}

// ── Floor / bathroom ──
function drawBathroom() {
  // Wall
  const wallGrad = ctx.createLinearGradient(0, 0, 0, floorY());
  wallGrad.addColorStop(0, '#d4e6f1');
  wallGrad.addColorStop(1, '#b8d4e3');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 0, W, floorY());

  // Tile lines on wall
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  const ts = 50 * scale;
  for (let x = 0; x < W; x += ts) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, floorY()); ctx.stroke();
  }
  for (let y = 0; y < floorY(); y += ts) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Floor
  const floorGrad = ctx.createLinearGradient(0, floorY(), 0, H);
  floorGrad.addColorStop(0, '#c9b896');
  floorGrad.addColorStop(1, '#b8a882');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, floorY(), W, H - floorY());

  // Floor tiles
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  const ft = 45;
  for (let x = 0; x < W; x += ft) {
    for (let y = floorY(); y < H; y += ft) {
      ctx.strokeRect(x, y, ft, ft);
    }
  }

  // Puddles
  for (const p of puddles) {
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, p.r * 1.5, p.r * 0.6, p.a || 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 215, 0, ${p.opacity * 0.4})`;
    ctx.fill();
    // Highlight
    ctx.beginPath();
    ctx.ellipse(p.x - p.r * 0.3, p.y - p.r * 0.1, p.r * 0.4, p.r * 0.15, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 235, 100, ${p.opacity * 0.2})`;
    ctx.fill();
  }
}

// ── HUD ──
function drawHUD() {
  // Top bar bg
  ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
  roundRect(10, 8, W - 20, 44, 12);
  ctx.fill();

  // Score
  ctx.fillStyle = '#FFD700';
  ctx.font = `bold ${16 * Math.min(scale, 1.3)}px system-ui, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(`⭐ ${Math.floor(score)}`, 24, 36);

  // Timer
  const secs = Math.ceil(timeLeft / 60);
  ctx.fillStyle = secs <= 5 ? '#ef4444' : '#e2e8f0';
  ctx.font = `bold ${18 * Math.min(scale, 1.3)}px system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`${secs}s`, W / 2, 36);

  // Combo
  if (combo > 2) {
    ctx.fillStyle = combo > 15 ? '#f59e0b' : combo > 8 ? '#22c55e' : '#3b82f6';
    ctx.font = `bold ${14 * Math.min(scale, 1.3)}px system-ui, sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(`🔥 x${combo}`, W - 24, 36);
  }

  // Mess meter (bottom)
  const mw = Math.min(250, W * 0.6), mh = 10;
  const mx = (W - mw) / 2, my = H - 30;
  ctx.fillStyle = 'rgba(15, 23, 42, 0.7)';
  roundRect(mx - 4, my - 4, mw + 8, mh + 8, 8);
  ctx.fill();

  ctx.fillStyle = '#1e293b';
  roundRect(mx, my, mw, mh, 5);
  ctx.fill();

  const mc = messLevel < 30 ? '#22c55e' : messLevel < 60 ? '#eab308' : '#ef4444';
  const messGrad = ctx.createLinearGradient(mx, 0, mx + mw * (messLevel / 100), 0);
  messGrad.addColorStop(0, mc);
  messGrad.addColorStop(1, mc + '99');
  ctx.fillStyle = messGrad;
  roundRect(mx, my, mw * (messLevel / 100), mh, 5);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = `${10}px system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`MESS ${Math.floor(messLevel)}%`, W / 2, my - 6);
}

// ── Title Screen ──
function drawTitle() {
  // BG gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0f172a');
  bg.addColorStop(1, '#1e293b');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Floating particles
  const t = Date.now() / 1000;
  ctx.globalAlpha = 0.06;
  for (let i = 0; i < 20; i++) {
    const px = (W * 0.1 + i * 47) % W;
    const py = (H * 0.1 + i * 73 + Math.sin(t + i) * 40) % H;
    ctx.beginPath(); ctx.arc(px, py, 20 + i * 2, 0, Math.PI * 2);
    ctx.fillStyle = i % 2 ? '#3b82f6' : '#FFD700';
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Toilet emoji
  ctx.font = `${80 * Math.min(scale, 1.5)}px serif`;
  ctx.textAlign = 'center';
  ctx.fillText('🚽', W / 2, H * 0.22);

  // Title
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${32 * Math.min(scale, 1.3)}px system-ui, sans-serif`;
  ctx.fillText('TOILET AIM', W / 2, H * 0.34);
  ctx.fillStyle = '#FFD700';
  ctx.font = `bold ${38 * Math.min(scale, 1.3)}px system-ui, sans-serif`;
  ctx.fillText('TRAINER', W / 2, H * 0.41);

  // Subtitle
  ctx.fillStyle = '#94a3b8';
  ctx.font = `${14 * Math.min(scale, 1.2)}px system-ui, sans-serif`;
  ctx.fillText('Can you keep it in the bowl?', W / 2, H * 0.47);

  // Start button
  const bw = Math.min(220, W * 0.55), bh = 56;
  const bx = W / 2 - bw / 2, by = H * 0.56;
  const btnGrad = ctx.createLinearGradient(bx, by, bx, by + bh);
  btnGrad.addColorStop(0, '#3b82f6');
  btnGrad.addColorStop(1, '#2563eb');
  ctx.fillStyle = btnGrad;
  roundRect(bx, by, bw, bh, 16);
  ctx.fill();
  // Button glow
  ctx.shadowColor = '#3b82f6'; ctx.shadowBlur = 20;
  roundRect(bx, by, bw, bh, 16); ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${20 * Math.min(scale, 1.2)}px system-ui, sans-serif`;
  ctx.fillText('TAP TO START', W / 2, by + bh / 2 + 7);

  // Controls hint
  ctx.fillStyle = '#64748b';
  ctx.font = `${12 * Math.min(scale, 1.2)}px system-ui, sans-serif`;
  ctx.fillText('Move your finger or mouse to aim', W / 2, H * 0.72);

  // High score area
  ctx.fillStyle = '#475569';
  ctx.font = `${13 * Math.min(scale, 1.2)}px system-ui, sans-serif`;
  const hs = localStorage.getItem('toilet_hs') || 0;
  if (hs > 0) ctx.fillText(`Best: ⭐ ${hs}`, W / 2, H * 0.82);

  // Version
  ctx.fillStyle = '#334155';
  ctx.font = `${10}px system-ui, sans-serif`;
  ctx.fillText('v1.0 — a game about bathroom accuracy', W / 2, H * 0.95);
}

// ── Ready countdown ──
function drawReady() {
  drawBathroom();
  drawToilet(W / 2);

  ctx.fillStyle = 'rgba(15, 23, 42, 0.6)';
  ctx.fillRect(0, 0, W, H);

  const elapsed = Date.now() % 2100;
  const num = elapsed < 700 ? '3' : elapsed < 1400 ? '2' : '1';
  const pulse = 1 + Math.sin(elapsed / 100) * 0.1;

  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(pulse, pulse);
  ctx.fillStyle = '#FFD700';
  ctx.font = `bold ${80}px system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(num, 0, 30);
  ctx.restore();

  ctx.fillStyle = '#94a3b8';
  ctx.font = `${16}px system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('GET READY...', W / 2, H / 2 + 70);
}

// ── Results ──
function drawResults() {
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0f172a');
  bg.addColorStop(1, '#1e293b');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const accuracy = hits + misses > 0 ? Math.round(hits / (hits + misses) * 100) : 0;
  const grade = messLevel < 15 ? { l: 'S', c: '#a855f7', e: '🏆', t: 'LEGENDARY AIM' }
    : messLevel < 30 ? { l: 'A', c: '#22c55e', e: '🌟', t: 'Bathroom-ready!' }
    : messLevel < 50 ? { l: 'B', c: '#84cc16', e: '👍', t: 'Getting there...' }
    : messLevel < 65 ? { l: 'C', c: '#eab308', e: '😬', t: 'Needs practice' }
    : messLevel < 80 ? { l: 'D', c: '#f97316', e: '🌊', t: 'Floor is lava... of pee' }
    : { l: 'F', c: '#ef4444', e: '💀', t: 'You ARE the disaster' };

  // Grade
  ctx.font = `${50}px serif`;
  ctx.textAlign = 'center';
  ctx.fillText(grade.e, W / 2, H * 0.13);

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${24 * Math.min(scale, 1.3)}px system-ui, sans-serif`;
  ctx.fillText("TIME'S UP!", W / 2, H * 0.21);

  // Grade letter with glow
  ctx.shadowColor = grade.c; ctx.shadowBlur = 30;
  ctx.fillStyle = grade.c;
  ctx.font = `bold ${90 * Math.min(scale, 1.3)}px system-ui, sans-serif`;
  ctx.fillText(grade.l, W / 2, H * 0.38);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#94a3b8';
  ctx.font = `${16 * Math.min(scale, 1.2)}px system-ui, sans-serif`;
  ctx.fillText(grade.t, W / 2, H * 0.44);

  // Stats card
  const cw = Math.min(300, W * 0.8), ch = 160;
  const cx = (W - cw) / 2, cy = H * 0.48;
  ctx.fillStyle = 'rgba(30, 41, 59, 0.8)';
  ctx.strokeStyle = '#334155';
  ctx.lineWidth = 1;
  roundRect(cx, cy, cw, ch, 16);
  ctx.fill(); ctx.stroke();

  const stats = [
    { label: 'Score', value: `⭐ ${Math.floor(score)}`, color: '#FFD700' },
    { label: 'Accuracy', value: `${accuracy}%`, color: accuracy > 70 ? '#22c55e' : '#ef4444' },
    { label: 'Max Combo', value: `🔥 ${maxCombo}`, color: '#f59e0b' },
    { label: 'Mess Level', value: `${Math.floor(messLevel)}%`, color: messLevel < 40 ? '#22c55e' : '#ef4444' },
  ];

  stats.forEach((s, i) => {
    const sy = cy + 25 + i * 34;
    ctx.fillStyle = '#94a3b8';
    ctx.font = `${13}px system-ui, sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(s.label, cx + 20, sy);
    ctx.fillStyle = s.color;
    ctx.font = `bold ${16}px system-ui, sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(s.value, cx + cw - 20, sy);
  });

  // High score
  const hs = parseInt(localStorage.getItem('toilet_hs') || '0');
  if (score > hs) {
    localStorage.setItem('toilet_hs', Math.floor(score));
    ctx.fillStyle = '#FFD700';
    ctx.font = `bold ${16 * Math.min(scale, 1.2)}px system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('🎉 NEW HIGH SCORE! 🎉', W / 2, H * 0.82);
  }

  // Restart
  ctx.fillStyle = '#64748b';
  ctx.font = `${14 * Math.min(scale, 1.2)}px system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('Tap anywhere to retry', W / 2, H * 0.9);
}

// ── Game Update ──
function update() {
  if (state !== 'playing') return;

  timeLeft--;
  if (timeLeft <= 0) { state = 'results'; return; }

  // Difficulty ramps
  difficulty = 1 + (1 - timeLeft / (maxTime * 60)) * 3;

  // Move toilet
  const speed = 1.5 + difficulty * 1.2;
  toiletVX = toiletVX > 0 ? speed : -speed;
  toiletX += toiletVX;
  if (toiletX > W - toiletW * 0.7 || toiletX < toiletW * 0.7) toiletVX *= -1;

  // Random direction changes
  if (Math.random() < 0.008 * difficulty) toiletVX *= -1;

  // Guy follows mouse with slight lag
  guyX += (mouseX - guyX) * 0.15;
  guyX = Math.max(30, Math.min(W - 30, guyX));

  // Stream end point (with wobble)
  const wobble = (Math.sin(Date.now() / 120) + Math.sin(Date.now() / 77) * 0.5) * (5 + difficulty * 3);
  const streamEndX = guyX + wobble;
  const fy = floorY();

  // Hit detection
  const inBowl = Math.abs(streamEndX - toiletX) < (toiletW / 2 - 5);

  if (inBowl) {
    hits++;
    combo++;
    maxCombo = Math.max(maxCombo, combo);
    const comboMultiplier = 1 + Math.min(combo, 20) * 0.15;
    score += 1 * comboMultiplier;

    // Splash in bowl
    if (Math.random() < 0.3) {
      drops.push({
        x: streamEndX + (Math.random() - 0.5) * 10,
        y: fy - 5,
        vx: (Math.random() - 0.5) * 1.5,
        vy: -1 - Math.random() * 1.5,
        life: 20, r: 1.5,
      });
    }
  } else {
    misses++;
    combo = 0;
    messLevel = Math.min(100, messLevel + 0.25 + difficulty * 0.1);

    // Floor puddle
    if (Math.random() < 0.5) {
      puddles.push({
        x: streamEndX + (Math.random() - 0.5) * 15,
        y: fy + 5 + Math.random() * 30,
        r: 3 + Math.random() * 5,
        a: Math.random() * Math.PI,
        opacity: 0.8,
      });
      if (puddles.length > 150) puddles.shift();
    }

    // Splatter
    for (let i = 0; i < 2; i++) {
      drops.push({
        x: streamEndX, y: fy + 5,
        vx: (Math.random() - 0.5) * 4,
        vy: -1 - Math.random() * 4,
        life: 25 + Math.random() * 15,
        r: 1 + Math.random() * 2,
      });
    }

    // Screen shake on bad miss
    if (messLevel > 50) {
      shakeX = (Math.random() - 0.5) * 4;
      shakeY = (Math.random() - 0.5) * 4;
    }
  }

  // Combo floater
  if (combo > 0 && combo % 10 === 0) {
    floaters.push({ x: W / 2, y: H * 0.5, text: `🔥 ${combo} COMBO!`, life: 90, color: '#f59e0b' });
  }

  // Update drops
  drops.forEach(d => { d.x += d.vx; d.y += d.vy; d.vy += 0.15; d.life--; });
  drops = drops.filter(d => d.life > 0);

  // Update floaters
  floaters.forEach(f => { f.y -= 1; f.life--; });
  floaters = floaters.filter(f => f.life > 0);

  // Decay puddle opacity
  puddles.forEach(p => { p.opacity = Math.max(0.2, p.opacity - 0.001); });

  // Shake decay
  shakeX *= 0.85; shakeY *= 0.85;
}

// ── Render ──
function render() {
  ctx.clearRect(0, 0, W, H);

  if (state === 'title') { drawTitle(); }
  else if (state === 'ready') { drawReady(); }
  else if (state === 'results') { drawResults(); }
  else if (state === 'playing') {
    ctx.save();
    ctx.translate(shakeX, shakeY);

    drawBathroom();
    drawToilet(toiletX);

    // Guy & stream
    const guyBottom = drawGuy(guyX);
    const wobble = (Math.sin(Date.now() / 120) + Math.sin(Date.now() / 77) * 0.5) * (5 + difficulty * 3);
    const streamEndX = guyX + wobble;
    const inBowl = Math.abs(streamEndX - toiletX) < (toiletW / 2 - 5);
    drawStream(guyBottom.x, guyBottom.y, streamEndX, floorY() - 5, inBowl);

    // Drops
    for (const d of drops) {
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 215, 0, ${d.life / 30})`;
      ctx.fill();
    }

    // Floaters
    for (const f of floaters) {
      ctx.fillStyle = f.color;
      ctx.globalAlpha = Math.min(1, f.life / 30);
      ctx.font = `bold ${20}px system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(f.text, f.x, f.y);
      ctx.globalAlpha = 1;
    }

    ctx.restore();
    drawHUD();
  }

  requestAnimationFrame(render);
}

setInterval(update, 1000 / 60);
render();
</script>
</body>
</html>
