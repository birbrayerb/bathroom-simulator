<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bathroom Disaster Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #fff; font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; overflow: hidden; touch-action: none; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Hi-DPI
let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize(); window.addEventListener('resize', resize);

// ── State ──
let state = 'menu'; // menu, game1, game2, game3, results
let score = 0, timeLeft = 0, maxTime = 20;
let mouseX = W / 2, mouseY = H / 2;
let particles = [];
let splashes = [];
let messLevel = 0; // 0-100

// Touch/mouse
function getPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const p = getPos(e); mouseX = p.x; mouseY = p.y; }, { passive: false });
canvas.addEventListener('touchstart', e => { e.preventDefault(); const p = getPos(e); mouseX = p.x; mouseY = p.y; handleClick(p.x, p.y); }, { passive: false });
canvas.addEventListener('click', e => handleClick(e.clientX, e.clientY));

// ── Menu buttons ──
function getMenuButtons() {
  const bw = Math.min(300, W * 0.7), bh = 60;
  const cx = W / 2 - bw / 2;
  const startY = H * 0.35;
  return [
    { x: cx, y: startY, w: bw, h: bh, label: '🚽 Toilet Aim Trainer', game: 'game1' },
    { x: cx, y: startY + 80, w: bw, h: bh, label: '🧼 Sink Splash Zone', game: 'game2' },
    { x: cx, y: startY + 160, w: bw, h: bh, label: '🪥 Toothbrush Tornado', game: 'game3' },
  ];
}

function handleClick(x, y) {
  if (state === 'menu') {
    for (const b of getMenuButtons()) {
      if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
        startGame(b.game);
        return;
      }
    }
  } else if (state === 'results') {
    state = 'menu';
  } else if (state === 'game2') {
    // Pump soap / splash
    game2Pump();
  } else if (state === 'game3') {
    game3Brush();
  }
}

// ── Particle system ──
function addParticle(x, y, vx, vy, color, life, size) {
  particles.push({ x, y, vx, vy, color, life, maxLife: life, size: size || 3 });
}
function addSplash(x, y, color, text) {
  splashes.push({ x, y, color, text, life: 60 });
}

// ══════════════════════════════════════════════
// GAME 1: Toilet Aim Trainer
// ══════════════════════════════════════════════
let toiletX, toiletVX, toiletW, streamActive, streamHits, streamMisses;
let guyX, guyY;
let puddleSpots = [];

function startGame(g) {
  state = g;
  score = 0; timeLeft = maxTime * 60; particles = []; splashes = []; messLevel = 0;
  puddleSpots = [];
  if (g === 'game1') {
    toiletX = W / 2; toiletVX = 2; toiletW = 70;
    streamHits = 0; streamMisses = 0;
    guyX = W / 2; guyY = H * 0.25;
  } else if (g === 'game2') {
    sinkX = W / 2; soapPumps = 0; waterOn = false;
    handX = W / 2; handY = H * 0.55;
    sinkSplashes = []; waterDrops = [];
    soapBubbles = [];
  } else if (g === 'game3') {
    brushX = W / 2; brushY = H * 0.4;
    mouthCenterX = W / 2; mouthCenterY = H * 0.45;
    toothpasteGlobs = []; brushStrokes = 0;
    mirrorSplats = [];
  }
}

function updateGame1() {
  // Move toilet
  toiletX += toiletVX;
  const toiletSpeed = 2 + (1 - timeLeft / (maxTime * 60)) * 4;
  toiletVX = toiletVX > 0 ? toiletSpeed : -toiletSpeed;
  if (toiletX > W - toiletW || toiletX < toiletW) toiletVX *= -1;

  // Stream from cursor position
  guyX = mouseX;
  const streamEndX = guyX + (Math.random() - 0.5) * 15;
  const streamEndY = H * 0.75;
  const toiletLeft = toiletX - toiletW / 2;
  const toiletRight = toiletX + toiletW / 2;
  const toiletTop = H * 0.7;

  // Stream particles
  for (let i = 0; i < 3; i++) {
    const t = Math.random();
    const px = guyX + (streamEndX - guyX) * t + (Math.random() - 0.5) * 8 * t;
    const py = guyY + 60 + (streamEndY - guyY - 60) * t;
    addParticle(px, py, (Math.random() - 0.5) * 0.5, 1 + Math.random(), '#FFD700', 20, 3);
  }

  // Check hit
  if (streamEndX >= toiletLeft && streamEndX <= toiletRight) {
    streamHits++;
    score += 2;
    if (Math.random() < 0.1) addSplash(toiletX, toiletTop, '#FFD700', '+2');
  } else {
    streamMisses++;
    messLevel = Math.min(100, messLevel + 0.3);
    // Floor puddle
    puddleSpots.push({ x: streamEndX + (Math.random() - 0.5) * 20, y: streamEndY + Math.random() * 20, r: 3 + Math.random() * 5, a: 0.6 });
    if (puddleSpots.length > 200) puddleSpots.shift();
    // Splash particles
    for (let i = 0; i < 2; i++) {
      addParticle(streamEndX, streamEndY, (Math.random() - 0.5) * 3, -Math.random() * 3, '#FFD700', 30, 2);
    }
  }
}

function drawGame1() {
  // Bathroom floor
  ctx.fillStyle = '#d4c5a9';
  ctx.fillRect(0, H * 0.7, W, H * 0.3);
  // Tiles
  ctx.strokeStyle = '#c4b599';
  ctx.lineWidth = 1;
  const tileSize = 40;
  for (let x = 0; x < W; x += tileSize) {
    for (let y = H * 0.7; y < H; y += tileSize) {
      ctx.strokeRect(x, y, tileSize, tileSize);
    }
  }

  // Puddles on floor
  for (const p of puddleSpots) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 215, 0, ${p.a})`;
    ctx.fill();
  }

  // Toilet
  const tx = toiletX, ty = H * 0.7;
  // Base
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.ellipse(tx, ty + 20, toiletW / 2 + 10, 25, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Bowl opening
  ctx.fillStyle = '#4a90d9';
  ctx.beginPath();
  ctx.ellipse(tx, ty, toiletW / 2, 20, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#ddd';
  ctx.stroke();
  // Tank
  ctx.fillStyle = '#e8e8e8';
  ctx.fillRect(tx - 25, ty - 50, 50, 35);
  ctx.strokeStyle = '#ccc';
  ctx.strokeRect(tx - 25, ty - 50, 50, 35);
  // Flush handle
  ctx.fillStyle = '#c0c0c0';
  ctx.fillRect(tx + 25, ty - 40, 15, 5);

  // Guy (stick figure)
  const gx = guyX, gy = guyY;
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  // Head
  ctx.beginPath(); ctx.arc(gx, gy - 15, 15, 0, Math.PI * 2); ctx.stroke();
  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(gx - 5, gy - 18, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(gx + 5, gy - 18, 2, 0, Math.PI * 2); ctx.fill();
  // Concentrating mouth
  ctx.beginPath(); ctx.arc(gx, gy - 8, 4, 0, Math.PI); ctx.stroke();
  // Body
  ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(gx, gy + 40); ctx.stroke();
  // Arms
  ctx.beginPath(); ctx.moveTo(gx - 20, gy + 15); ctx.lineTo(gx, gy + 25); ctx.lineTo(gx + 20, gy + 15); ctx.stroke();
  // Legs
  ctx.beginPath(); ctx.moveTo(gx, gy + 40); ctx.lineTo(gx - 15, gy + 65); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(gx, gy + 40); ctx.lineTo(gx + 15, gy + 65); ctx.stroke();

  // Stream (yellow arc)
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(gx, gy + 45);
  const endX = gx + (Math.random() - 0.5) * 10;
  ctx.quadraticCurveTo(gx + 5, gy + 80, endX, H * 0.73);
  ctx.stroke();

  // Mess meter
  drawMessMeter();
}

// ══════════════════════════════════════════════
// GAME 2: Sink Splash Zone
// ══════════════════════════════════════════════
let sinkX, soapPumps, waterOn, handX, handY;
let sinkSplashes, waterDrops, soapBubbles;

function game2Pump() {
  soapPumps++;
  // Too much soap = mess
  for (let i = 0; i < 5 + soapPumps * 2; i++) {
    soapBubbles.push({
      x: handX + (Math.random() - 0.5) * 40,
      y: handY + (Math.random() - 0.5) * 20,
      r: 3 + Math.random() * 6,
      vx: (Math.random() - 0.5) * 4,
      vy: -1 - Math.random() * 3,
      life: 120
    });
  }
  if (soapPumps > 3) {
    messLevel = Math.min(100, messLevel + 5);
    addSplash(handX, handY, '#87CEEB', 'TOO MUCH SOAP!');
  }
  score += soapPumps <= 3 ? 10 : -5;
}

function updateGame2() {
  handX = mouseX;
  handY = Math.max(H * 0.4, Math.min(H * 0.7, mouseY));

  const sinkCenter = W / 2;
  const sinkTop = H * 0.55;
  const sinkW = 160;

  // Water from faucet
  if (Math.random() < 0.4) {
    waterDrops.push({
      x: sinkCenter + (Math.random() - 0.5) * 20,
      y: sinkTop - 60,
      vx: (Math.random() - 0.5) * 1,
      vy: 2 + Math.random() * 2,
      life: 60
    });
  }

  // Update water drops
  for (const d of waterDrops) {
    d.x += d.vx; d.y += d.vy; d.vy += 0.2; d.life--;
    // If hands are near faucet, splash everywhere
    const dist = Math.hypot(d.x - handX, d.y - handY);
    if (dist < 30) {
      d.life = 0;
      for (let i = 0; i < 3; i++) {
        sinkSplashes.push({
          x: d.x, y: d.y,
          vx: (Math.random() - 0.5) * 8,
          vy: -2 - Math.random() * 5,
          life: 40 + Math.random() * 30
        });
        messLevel = Math.min(100, messLevel + 0.15);
      }
    }
  }
  waterDrops = waterDrops.filter(d => d.life > 0);

  // Update splashes
  for (const s of sinkSplashes) {
    s.x += s.vx; s.y += s.vy; s.vy += 0.15; s.life--;
  }
  sinkSplashes = sinkSplashes.filter(s => s.life > 0);

  // Update soap bubbles
  for (const b of soapBubbles) {
    b.x += b.vx; b.y += b.vy; b.vy += 0.05; b.life--;
    // Bubbles that fly far = mess
    if (b.y < sinkTop - 80 || Math.abs(b.x - sinkCenter) > sinkW) {
      messLevel = Math.min(100, messLevel + 0.1);
    }
  }
  soapBubbles = soapBubbles.filter(b => b.life > 0);

  // Score for keeping hands in sink area
  if (Math.abs(handX - sinkCenter) < sinkW / 2 && handY > sinkTop - 20 && handY < sinkTop + 60) {
    score += 0.5;
  }
}

function drawGame2() {
  // Counter
  ctx.fillStyle = '#8B7355';
  ctx.fillRect(0, H * 0.5, W, H * 0.5);

  // Sink basin
  const sx = W / 2, sy = H * 0.6;
  ctx.fillStyle = '#e8e8e8';
  ctx.beginPath();
  ctx.ellipse(sx, sy, 90, 40, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#4a90d9';
  ctx.beginPath();
  ctx.ellipse(sx, sy, 75, 30, 0, 0, Math.PI * 2);
  ctx.fill();

  // Faucet
  ctx.fillStyle = '#c0c0c0';
  ctx.fillRect(sx - 8, sy - 80, 16, 50);
  ctx.beginPath();
  ctx.arc(sx, sy - 80, 12, Math.PI, 0);
  ctx.fill();
  // Spout
  ctx.fillRect(sx + 5, sy - 75, 25, 8);
  ctx.fillRect(sx + 25, sy - 75, 8, 20);

  // Water stream from faucet
  ctx.strokeStyle = 'rgba(74, 144, 217, 0.6)';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(sx + 29, sy - 55);
  ctx.lineTo(sx + 29 + (Math.random() - 0.5) * 3, sy - 10);
  ctx.stroke();

  // Soap dispenser
  ctx.fillStyle = '#f5deb3';
  ctx.fillRect(sx + 110, sy - 60, 30, 50);
  ctx.fillStyle = '#daa520';
  ctx.fillRect(sx + 118, sy - 75, 14, 20);
  ctx.fillRect(sx + 110, sy - 75, 30, 5);

  // Water splashes
  for (const s of sinkSplashes) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, 2 + Math.random() * 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(74, 144, 217, ${s.life / 40})`;
    ctx.fill();
  }

  // Soap bubbles
  for (const b of soapBubbles) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${b.life / 120 * 0.7})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(135, 206, 235, ${b.life / 120 * 0.5})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    // Sheen
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${b.life / 120 * 0.4})`;
    ctx.fill();
  }

  // Hands
  ctx.fillStyle = '#f4c89a';
  ctx.beginPath();
  ctx.ellipse(handX - 12, handY, 18, 12, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(handX + 12, handY, 18, 12, 0.2, 0, Math.PI * 2);
  ctx.fill();
  // Fingers
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.ellipse(handX - 12 + i * 8, handY - 10, 4, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(handX + 12 + i * 8, handY - 10, 4, 8, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Floor splashes (mess indicator)
  if (messLevel > 10) {
    for (let i = 0; i < messLevel / 5; i++) {
      const px = W * 0.2 + (i * 37 % (W * 0.6));
      const py = H * 0.85 + (i * 23 % (H * 0.1));
      ctx.beginPath();
      ctx.ellipse(px, py, 5 + (i % 5), 3, i * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(74, 144, 217, 0.3)';
      ctx.fill();
    }
  }

  // Instructions
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '14px "Comic Sans MS"';
  ctx.textAlign = 'center';
  ctx.fillText('Move hands with mouse/finger • Tap to pump soap', W / 2, H * 0.38);

  drawMessMeter();
}

// ══════════════════════════════════════════════
// GAME 3: Toothbrush Tornado
// ══════════════════════════════════════════════
let brushX, brushY, mouthCenterX, mouthCenterY;
let toothpasteGlobs, brushStrokes, mirrorSplats;

function game3Brush() {
  brushStrokes++;
  // Splatter toothpaste based on distance from mouth
  const dist = Math.hypot(brushX - mouthCenterX, brushY - mouthCenterY);
  const wildness = Math.max(0, dist - 30) / 50;

  for (let i = 0; i < 2 + wildness * 5; i++) {
    toothpasteGlobs.push({
      x: brushX + (Math.random() - 0.5) * 30,
      y: brushY + (Math.random() - 0.5) * 30,
      vx: (Math.random() - 0.5) * (3 + wildness * 5),
      vy: -2 - Math.random() * (3 + wildness * 3),
      r: 2 + Math.random() * 4,
      life: 90,
      color: Math.random() < 0.7 ? '#87CEEB' : '#FFFFFF'
    });
  }

  if (dist < 40) {
    score += 15;
  } else {
    messLevel = Math.min(100, messLevel + 2);
    score -= 5;
  }
}

function updateGame3() {
  brushX = mouseX;
  brushY = mouseY;

  // Mouth bobs slightly
  mouthCenterX = W / 2 + Math.sin(Date.now() / 1000) * 10;
  mouthCenterY = H * 0.45 + Math.cos(Date.now() / 800) * 5;

  // Update toothpaste globs
  for (const g of toothpasteGlobs) {
    g.x += g.vx; g.y += g.vy; g.vy += 0.1; g.life--;
    // Hit mirror (top area)
    if (g.y < H * 0.15 && g.life > 20) {
      mirrorSplats.push({ x: g.x, y: g.y, r: g.r + 2, color: g.color });
      g.life = 0;
      messLevel = Math.min(100, messLevel + 0.5);
    }
  }
  toothpasteGlobs = toothpasteGlobs.filter(g => g.life > 0);

  // Auto-brushing particles when near mouth
  const dist = Math.hypot(brushX - mouthCenterX, brushY - mouthCenterY);
  if (dist < 50) {
    score += 0.3;
    if (Math.random() < 0.3) {
      toothpasteGlobs.push({
        x: brushX + (Math.random() - 0.5) * 20,
        y: brushY,
        vx: (Math.random() - 0.5) * 2,
        vy: -1 - Math.random() * 2,
        r: 1 + Math.random() * 2,
        life: 50,
        color: Math.random() < 0.5 ? '#87CEEB' : 'rgba(255,255,255,0.8)'
      });
    }
  }
}

function drawGame3() {
  // Mirror
  ctx.fillStyle = '#a8d5e2';
  ctx.fillRect(W * 0.15, H * 0.05, W * 0.7, H * 0.3);
  ctx.strokeStyle = '#8B7355';
  ctx.lineWidth = 8;
  ctx.strokeRect(W * 0.15, H * 0.05, W * 0.7, H * 0.3);
  // Mirror reflection
  const grad = ctx.createLinearGradient(W * 0.15, H * 0.05, W * 0.85, H * 0.35);
  grad.addColorStop(0, 'rgba(255,255,255,0.15)');
  grad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
  grad.addColorStop(1, 'rgba(255,255,255,0.1)');
  ctx.fillStyle = grad;
  ctx.fillRect(W * 0.15, H * 0.05, W * 0.7, H * 0.3);

  // Mirror splats
  for (const s of mirrorSplats) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.fill();
    // Drip
    ctx.beginPath();
    ctx.ellipse(s.x, s.y + s.r + 3, s.r * 0.5, s.r * 0.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.fill();
  }

  // Sink/counter
  ctx.fillStyle = '#d4c5a9';
  ctx.fillRect(0, H * 0.7, W, H * 0.3);

  // Face (simple cartoon)
  const fx = mouthCenterX, fy = mouthCenterY - 30;
  // Head
  ctx.fillStyle = '#f4c89a';
  ctx.beginPath();
  ctx.ellipse(fx, fy, 50, 60, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#d4a574';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(fx - 18, fy - 15, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(fx + 18, fy - 15, 5, 0, Math.PI * 2); ctx.fill();
  // Eye whites
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(fx - 18, fy - 15, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(fx - 16, fy - 15, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(fx + 18, fy - 15, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(fx + 20, fy - 15, 3, 0, Math.PI * 2); ctx.fill();
  // Nose
  ctx.beginPath(); ctx.moveTo(fx, fy - 5); ctx.lineTo(fx - 6, fy + 8); ctx.lineTo(fx + 6, fy + 8); ctx.closePath();
  ctx.fillStyle = '#e8b88a'; ctx.fill();
  // Open mouth
  ctx.fillStyle = '#8B0000';
  ctx.beginPath();
  ctx.ellipse(mouthCenterX, mouthCenterY, 25, 18, 0, 0, Math.PI * 2);
  ctx.fill();
  // Teeth
  ctx.fillStyle = '#fff';
  for (let i = -3; i <= 3; i++) {
    ctx.fillRect(mouthCenterX + i * 7 - 3, mouthCenterY - 12, 6, 8);
    ctx.fillRect(mouthCenterX + i * 7 - 3, mouthCenterY + 4, 6, 8);
  }
  // Hair
  ctx.fillStyle = '#4a3728';
  ctx.beginPath();
  ctx.ellipse(fx, fy - 55, 52, 20, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Toothpaste globs flying
  for (const g of toothpasteGlobs) {
    ctx.beginPath();
    ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
    ctx.fillStyle = g.color;
    ctx.fill();
  }

  // Toothbrush at cursor
  const bx = brushX, by = brushY;
  // Handle
  ctx.fillStyle = '#3498db';
  ctx.save();
  ctx.translate(bx, by);
  ctx.rotate(0.3);
  ctx.fillRect(-4, -40, 8, 50);
  // Bristles
  ctx.fillStyle = '#fff';
  ctx.fillRect(-6, -45, 12, 10);
  // Toothpaste on brush
  ctx.fillStyle = '#87CEEB';
  ctx.beginPath();
  ctx.ellipse(0, -48, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Instructions
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '14px "Comic Sans MS"';
  ctx.textAlign = 'center';
  ctx.fillText('Guide brush to mouth • Tap to brush • Don\'t splatter the mirror!', W / 2, H * 0.92);

  drawMessMeter();
}

// ── Shared UI ──
function drawMessMeter() {
  const bw = 150, bh = 20;
  const bx = W - bw - 20, by = 50;

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(bx - 2, by - 2, bw + 4, bh + 4);
  ctx.fillStyle = '#333';
  ctx.fillRect(bx, by, bw, bh);

  const color = messLevel < 30 ? '#22c55e' : messLevel < 60 ? '#eab308' : '#ef4444';
  ctx.fillStyle = color;
  ctx.fillRect(bx, by, bw * (messLevel / 100), bh);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px "Comic Sans MS"';
  ctx.textAlign = 'center';
  ctx.fillText(`MESS: ${Math.floor(messLevel)}%`, bx + bw / 2, by + 14);

  // Score
  ctx.font = 'bold 18px "Comic Sans MS"';
  ctx.textAlign = 'left';
  ctx.fillText(`Score: ${Math.floor(score)}`, 20, 40);

  // Timer
  const secs = Math.ceil(timeLeft / 60);
  ctx.fillStyle = secs <= 5 ? '#ef4444' : '#fff';
  ctx.font = 'bold 18px "Comic Sans MS"';
  ctx.textAlign = 'center';
  ctx.fillText(`⏱ ${secs}s`, W / 2, 40);
}

function drawMenu() {
  // Title
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px "Comic Sans MS"';
  ctx.textAlign = 'center';
  ctx.fillText('🚽 BATHROOM DISASTER', W / 2, H * 0.15);
  ctx.font = 'bold 28px "Comic Sans MS"';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('SIMULATOR', W / 2, H * 0.22);

  ctx.font = '16px "Comic Sans MS"';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText('For everyone who can\'t use a bathroom properly', W / 2, H * 0.28);

  // Buttons
  for (const b of getMenuButtons()) {
    const hover = mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h;
    ctx.fillStyle = hover ? '#3b82f6' : '#1e293b';
    ctx.strokeStyle = hover ? '#60a5fa' : '#334155';
    ctx.lineWidth = 2;
    // Rounded rect
    const r = 12;
    ctx.beginPath();
    ctx.moveTo(b.x + r, b.y);
    ctx.lineTo(b.x + b.w - r, b.y);
    ctx.arcTo(b.x + b.w, b.y, b.x + b.w, b.y + r, r);
    ctx.lineTo(b.x + b.w, b.y + b.h - r);
    ctx.arcTo(b.x + b.w, b.y + b.h, b.x + b.w - r, b.y + b.h, r);
    ctx.lineTo(b.x + r, b.y + b.h);
    ctx.arcTo(b.x, b.y + b.h, b.x, b.y + b.h - r, r);
    ctx.lineTo(b.x, b.y + r);
    ctx.arcTo(b.x, b.y, b.x + r, b.y, r);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px "Comic Sans MS"';
    ctx.textAlign = 'center';
    ctx.fillText(b.label, b.x + b.w / 2, b.y + b.h / 2 + 6);
  }

  // Floating emojis
  const t = Date.now() / 1000;
  const emojis = ['🚽', '🧼', '🪥', '💦', '🧻', '🫧'];
  for (let i = 0; i < emojis.length; i++) {
    const ex = W * 0.1 + (i * W * 0.15);
    const ey = H * 0.8 + Math.sin(t + i * 1.2) * 20;
    ctx.font = '30px serif';
    ctx.fillText(emojis[i], ex, ey);
  }
}

function drawResults() {
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px "Comic Sans MS"';
  ctx.textAlign = 'center';
  ctx.fillText('TIME\'S UP!', W / 2, H * 0.2);

  const grade = messLevel < 20 ? { letter: 'A+', comment: 'Mom would be proud! 🌟', color: '#22c55e' }
    : messLevel < 40 ? { letter: 'B', comment: 'Not bad... for an amateur 😏', color: '#84cc16' }
    : messLevel < 60 ? { letter: 'C', comment: 'The bathroom has seen better days 😬', color: '#eab308' }
    : messLevel < 80 ? { letter: 'D', comment: 'Did a tornado hit the bathroom?! 🌪️', color: '#f97316' }
    : { letter: 'F', comment: 'You ARE the mess. Legendary. 💀', color: '#ef4444' };

  ctx.font = 'bold 80px "Comic Sans MS"';
  ctx.fillStyle = grade.color;
  ctx.fillText(grade.letter, W / 2, H * 0.42);

  ctx.font = '20px "Comic Sans MS"';
  ctx.fillStyle = '#fff';
  ctx.fillText(`Score: ${Math.floor(score)}`, W / 2, H * 0.52);
  ctx.fillText(`Mess Level: ${Math.floor(messLevel)}%`, W / 2, H * 0.58);

  ctx.font = '18px "Comic Sans MS"';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText(grade.comment, W / 2, H * 0.67);

  ctx.font = '16px "Comic Sans MS"';
  ctx.fillStyle = '#60a5fa';
  ctx.fillText('Tap anywhere to go back', W / 2, H * 0.8);
}

// ── Main Loop ──
function update() {
  if (state.startsWith('game')) {
    timeLeft--;
    if (timeLeft <= 0) {
      state = 'results';
      return;
    }
    if (state === 'game1') updateGame1();
    else if (state === 'game2') updateGame2();
    else if (state === 'game3') updateGame3();

    // Update particles
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
    }
    particles = particles.filter(p => p.life > 0);

    // Update splashes
    for (const s of splashes) s.life--;
    splashes = splashes.filter(s => s.life > 0);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  if (state === 'menu' || state === 'results') {
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, W, H);
  } else {
    // Bathroom wall
    ctx.fillStyle = '#b8d4e3';
    ctx.fillRect(0, 0, W, H);
  }

  if (state === 'menu') drawMenu();
  else if (state === 'game1') drawGame1();
  else if (state === 'game2') drawGame2();
  else if (state === 'game3') drawGame3();
  else if (state === 'results') drawResults();

  // Draw particles
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Draw text splashes
  for (const s of splashes) {
    ctx.fillStyle = s.color;
    ctx.font = 'bold 16px "Comic Sans MS"';
    ctx.textAlign = 'center';
    ctx.globalAlpha = s.life / 60;
    ctx.fillText(s.text, s.x, s.y - (60 - s.life));
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(draw);
}

setInterval(update, 1000 / 60);
draw();
</script>
